x-laravel-env: &laravel-env
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_DATABASE: mini_crm
  DB_USERNAME: mini_crm
  DB_PASSWORD: mini_crm
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  APP_URL: http://localhost:8000

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mini_crm
      MYSQL_USER: mini_crm
      MYSQL_PASSWORD: mini_crm
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-crm-app:latest
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      <<: *laravel-env
      RUN_MIGRATE: "1"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 8000) ? 0 : 1);"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 120s
    command: ["sh", "-c", "php docker/patch-env-from-compose.php && exec php artisan serve --host=0.0.0.0 --port=8000"]

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-crm-app:latest
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      <<: *laravel-env
      RUN_MIGRATE: "0"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3"]

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-crm-app:latest
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      <<: *laravel-env
      RUN_MIGRATE: "0"
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]

volumes:
  mysql_data:
